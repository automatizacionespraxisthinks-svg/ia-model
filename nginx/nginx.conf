worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    # ─── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ─── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types application/json text/plain;

    # ─── Seguridad ─────────────────────────────────────────────────────────────
    server_tokens off;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # Tamaño máximo del body (ajustar según necesidad)
    client_max_body_size 10m;

    # ─── Rate limiting a nivel Nginx (capa adicional) ──────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ─── Upstream ──────────────────────────────────────────────────────────────
    upstream praxis_api {
        server api:8000;
        keepalive 32;
    }

    # ─── Server HTTP → redirige a HTTPS en producción ──────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check sin redirección (para load balancers)
        location /health {
            proxy_pass http://praxis_api;
            proxy_set_header Host $host;
        }

        # Todo lo demás → redirigir a HTTPS si tienes certificado,
        # o dejar en HTTP para desarrollo local
        location / {
            # Descomentar para forzar HTTPS:
            # return 301 https://$host$request_uri;

            limit_req zone=api burst=10 nodelay;
            proxy_pass http://praxis_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
            proxy_send_timeout 30s;
        }
    }

    # ─── Server HTTPS (descomentar cuando tengas certificado SSL) ──────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name tu-dominio.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location / {
    #         limit_req zone=api burst=10 nodelay;
    #         proxy_pass http://praxis_api;
    #         proxy_http_version 1.1;
    #         proxy_set_header Connection "";
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #         proxy_read_timeout 180s;
    #     }
    # }
}
