worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    # ─── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ─── Performance ───────────────────────────────────────────────────────────
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types application/json text/plain;

    # ─── Seguridad ─────────────────────────────────────────────────────────────
    server_tokens off;
    add_header X-Content-Type-Options  nosniff always;
    add_header X-Frame-Options         DENY    always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10m;

    # ─── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ─── Upstream ──────────────────────────────────────────────────────────────
    upstream praxis_api {
        server api:8000;
        keepalive 32;
    }

    # ─── HTTP → redirige a HTTPS ────────────────────────────────────────────────
    server {
        listen 80;
        server_name ia.praxisia.org;

        # Necesario para renovación automática de Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name ia.praxisia.org;

        # Certificados Let's Encrypt
        ssl_certificate     /etc/letsencrypt/live/ia.praxisia.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ia.praxisia.org/privkey.pem;

        # Configuración SSL moderna
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;

        # ─── Proxy a FastAPI ───────────────────────────────────────────────────
        location / {
            limit_req zone=api burst=15 nodelay;

            proxy_pass         http://praxis_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection      "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            # Timeout generoso para inferencia LLM (puede tardar)
            proxy_read_timeout 180s;
            proxy_send_timeout  30s;
        }

        # ─── Health check sin rate limit ───────────────────────────────────────
        location /health {
            proxy_pass         http://praxis_api;
            proxy_set_header   Host $host;
            access_log off;
        }
    }
}
